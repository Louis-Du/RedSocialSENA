<!-- Vista: Editar perfil propio -->
<div id="editProfileView" class="hidden min-h-screen bg-sena-fondo">

  <!-- Header -->
  <nav class="bg-sena-verde text-white sticky top-0 z-40 shadow-lg">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
      <button id="returnToAppBtnProfile"
        class="p-2 rounded-full hover:bg-white hover:bg-opacity-20 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </button>
      <h2 class="font-bold text-lg">Mi Perfil</h2>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-6">

    <!-- Foto y banner -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <!-- Banner placeholder -->
      <div class="h-32 bg-gradient-to-r from-sena-verde to-green-400 relative">
        <img src="assets/placeholders/banner-profile.svg" alt="" class="w-full h-full object-cover opacity-30">
      </div>

      <!-- Avatar -->
      <div class="px-6 pb-6">
        <div class="flex items-end gap-4 -mt-12 mb-4">
          <div class="relative">
            <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden bg-gray-200 shadow-md">
              <img id="profilePicturePreview" src="assets/placeholders/avatar-placeholder.svg"
                alt="Foto de perfil" class="w-full h-full object-cover">
            </div>
            <button id="changeProfilePictureBtn"
              class="absolute bottom-0 right-0 bg-sena-verde text-white rounded-full p-1.5 shadow hover:bg-green-700 transition-colors">
              <i data-lucide="camera" class="w-3 h-3"></i>
            </button>
            <input id="profilePictureInput" type="file" accept="image/*" class="hidden">
          </div>
        </div>

        <!-- Pestañas de secciones -->
        <div class="flex border-b border-gray-200 mb-6 overflow-x-auto">
          <button class="profile-nav-link px-4 py-2 text-sm font-semibold text-sena-verde border-b-2 border-sena-verde whitespace-nowrap" data-target="content1">
            Información personal
          </button>
          <button class="profile-nav-link px-4 py-2 text-sm font-semibold text-gray-500 hover:text-sena-verde whitespace-nowrap" data-target="content2">
            Formación SENA
          </button>
          <button class="profile-nav-link px-4 py-2 text-sm font-semibold text-gray-500 hover:text-sena-verde whitespace-nowrap" data-target="content3">
            Ubicación
          </button>
          <button class="profile-nav-link px-4 py-2 text-sm font-semibold text-gray-500 hover:text-sena-verde whitespace-nowrap" data-target="content4">
            Seguridad
          </button>
        </div>

        <!-- Sección 1: Información personal -->
        <div id="content1" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre completo</label>
            <input type="text" name="nombre" placeholder="Tu nombre"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Apodo</label>
            <input type="text" name="apodo" placeholder="¿Cómo te llaman?"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Biografía</label>
            <textarea name="bio" rows="3" placeholder="Cuéntanos sobre ti..."
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors resize-none"></textarea>
          </div>
          <button type="button"
            class="w-full py-3 bg-sena-verde text-white font-bold rounded-xl hover:bg-green-700 transition-colors">
            Guardar cambios
          </button>
        </div>

        <!-- Sección 2: Formación SENA -->
        <div id="content2" class="hidden space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Programa de formación</label>
            <input type="text" name="programa" placeholder="Ej: Análisis y Desarrollo de Software"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Trimestre actual</label>
            <input type="text" name="trimestre" placeholder="Ej: 4"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Etapa</label>
            <select name="etapa"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
              <option value="lectiva">Lectiva</option>
              <option value="productiva">Productiva</option>
              <option value="egresado">Egresado</option>
            </select>
          </div>
          <button type="button"
            class="w-full py-3 bg-sena-verde text-white font-bold rounded-xl hover:bg-green-700 transition-colors">
            Guardar cambios
          </button>
        </div>

        <!-- Sección 3: Ubicación -->
        <div id="content3" class="hidden space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Regional</label>
            <input type="text" name="regional" placeholder="Ej: Regional Antioquia"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Centro de formación</label>
            <input type="text" name="centro" placeholder="Nombre del centro"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Ciudad de residencia</label>
            <input type="text" name="ciudad" placeholder="Tu ciudad"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Modalidad</label>
            <select name="modalidad"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
              <option value="presencial">Presencial</option>
              <option value="virtual">Virtual</option>
            </select>
          </div>
          <button type="button"
            class="w-full py-3 bg-sena-verde text-white font-bold rounded-xl hover:bg-green-700 transition-colors">
            Guardar cambios
          </button>
        </div>

        <!-- Sección 4: Seguridad -->
        <div id="content4" class="hidden space-y-4">
          <p class="text-sm text-gray-500">Cambia tu contraseña de acceso.</p>
          <form>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña actual</label>
                <input type="password" name="currentPassword"
                  class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nueva contraseña</label>
                <input type="password" name="newPassword"
                  class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
              </div>
              <button type="button"
                class="w-full py-3 bg-sena-verde text-white font-bold rounded-xl hover:bg-green-700 transition-colors">
                Actualizar contraseña
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>

    <!-- Publicaciones del perfil -->
    <div id="profileContentArea" class="space-y-4">
      <!-- ProfileManager renderiza aquí las publicaciones del usuario -->
    </div>

  </main>
</div>

<!-- Vista: Perfil de otro usuario -->
<div id="otherProfileView" class="hidden min-h-screen bg-sena-fondo">

  <nav class="bg-sena-verde text-white sticky top-0 z-40 shadow-lg">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
      <button id="returnToAppBtnOtherProfile"
        class="p-2 rounded-full hover:bg-white hover:bg-opacity-20 transition-colors">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </button>
      <h2 class="font-bold text-lg">Perfil</h2>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-6 space-y-4">
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">

      <!-- Banner -->
      <div class="h-32 bg-gradient-to-r from-sena-verde to-green-400"></div>

      <!-- Avatar y datos -->
      <div class="px-6 pb-6">
        <div class="flex items-end justify-between -mt-12 mb-4">
          <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden bg-gray-200 shadow-md">
            <img class="w-32 h-32 rounded-full overflow-hidden" src="assets/placeholders/avatar-placeholder.svg" alt="Avatar">
          </div>
          <button id="sendMessageToUserBtn"
            class="flex items-center gap-2 px-4 py-2 bg-sena-verde text-white font-semibold rounded-xl shadow hover:bg-green-700 transition-colors text-sm">
            <i data-lucide="message-circle" class="w-4 h-4"></i>Mensaje
          </button>
        </div>

        <!-- Info del usuario (OtherProfileManager rellena estos elementos) -->
        <h2 class="text-2xl font-bold text-gray-900">Nombre del usuario</h2>
        <h3 class="text-sena-verde font-semibold text-sm mt-0.5">@apodo</h3>
        <p class="text-gray-700 leading-relaxed mt-2 text-sm">Biografía del usuario...</p>

        <div class="flex items-center gap-2 mt-3 text-sm text-gray-500">
          <i data-lucide="map-pin" class="w-4 h-4"></i>
          <span id="regionalField">Regional</span>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-4 text-sm text-gray-600">
          <div><span class="font-semibold">Documento:</span> <span id="documentoField">-</span></div>
          <div><span class="font-semibold">Programa:</span> <span id="programaField">-</span></div>
          <div><span class="font-semibold">Centro:</span> <span id="centroField">-</span></div>
          <div><span class="font-semibold">Trimestre:</span> <span id="trimestreField">-</span></div>
          <div><span class="font-semibold">Modalidad:</span> <span id="modalidadField">-</span></div>
        </div>
      </div>
    </div>

    <!-- Publicaciones del otro usuario -->
    <div id="otherProfilePostsSection" class="space-y-4"></div>
    <div id="otherProfileCommentsSection" class="space-y-4"></div>
  </main>
</div>
