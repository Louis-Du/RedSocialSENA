<!-- Vista: Login -->
<div id="loginView" class="min-h-screen flex items-center justify-center bg-sena-fondo p-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">

    <!-- Logo SENA -->
    <div class="flex flex-col items-center mb-8">
      <img src="assets/logo-sena-verde.png" alt="SENA" class="h-16 mb-3">
      <h1 class="text-2xl font-bold text-gray-900">Red Social SENA</h1>
      <p class="text-gray-500 text-sm mt-1">Ingresa a tu cuenta de aprendiz</p>
    </div>

    <!-- Indicador de sesión -->
    <div id="sessionIndicator" class="hidden mb-4 p-3 rounded-xl bg-blue-50 text-blue-700 text-sm text-center"></div>

    <!-- Formulario de login -->
    <form id="loginForm" class="space-y-5" novalidate>

      <!-- Tipo de documento -->
      <div>
        <label for="tipoDoc" class="block text-sm font-semibold text-gray-700 mb-1">Tipo de documento</label>
        <select id="tipoDoc" name="tipoDoc"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
          <option value="">Selecciona...</option>
          <option value="CC">Cédula de Ciudadanía (CC)</option>
          <option value="TI">Tarjeta de Identidad (TI)</option>
          <option value="CE">Cédula de Extranjería (CE)</option>
        </select>
      </div>

      <!-- Número de documento -->
      <div>
        <label for="documento" class="block text-sm font-semibold text-gray-700 mb-1">Número de documento</label>
        <input id="documento" name="documento" type="text" inputmode="numeric"
          placeholder="Ej: 1234567890"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
      </div>

      <!-- Contraseña -->
      <div>
        <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
        <input id="password" name="password" type="password"
          placeholder="Mínimo 6 caracteres"
          class="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-gray-200 focus:border-sena-verde focus:outline-none transition-colors">
      </div>

      <!-- Botón de login -->
      <button id="loginSubmitBtn" type="submit"
        class="w-full py-3 bg-sena-verde text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2">
        <i data-lucide="log-in" class="w-5 h-5"></i>
        Ingresar
      </button>
    </form>

    <!-- Ir a registro -->
    <p class="text-center text-sm text-gray-500 mt-6">
      ¿No tienes cuenta?
      <button id="goToRegisterBtn" class="text-sena-verde font-semibold hover:underline ml-1">
        Regístrate aquí
      </button>
    </p>
  </div>
</div>
