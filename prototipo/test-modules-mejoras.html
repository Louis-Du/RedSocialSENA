<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test de Módulos - Mejoras</title>
</head>
<body>
    <h1>Test de Carga de Módulos</h1>
    <div id="results"></div>
    
    <script type="module">
        const results = document.getElementById('results');
        
        async function testModule(name, importFn) {
            try {
                const module = await importFn();
                results.innerHTML += `<p style="color: green;">✅ ${name} - OK</p>`;
                console.log(`✅ ${name}:`, module);
                return true;
            } catch (error) {
                results.innerHTML += `<p style="color: red;">❌ ${name} - ERROR: ${error.message}</p>`;
                console.error(`❌ ${name}:`, error);
                return false;
            }
        }

        (async () => {
            console.log('🧪 Iniciando tests de módulos...');
            
            // Test utilidades nuevas
            await testModule('FormValidator', () => import('./js/utils/FormValidator.js'));
            await testModule('ButtonHelper', () => import('./js/utils/ButtonHelper.js'));
            await testModule('UIComponents', () => import('./js/utils/UIComponents.js'));
            
            // Test módulos actualizados
            await testModule('MessageManager', () => import('./js/ui/MessageManager.js'));
            await testModule('AuthManager', () => import('./js/ui/AuthManager.js'));
            await testModule('PostManager', () => import('./js/ui/PostManager.js'));
            await testModule('FeedRenderer', () => import('./js/ui/FeedRenderer.js'));
            await testModule('ChatManager', () => import('./js/ui/ChatManager.js'));
            
            console.log('✅ Todos los tests de módulos completados');
        })();
    </script>
</body>
</html>
