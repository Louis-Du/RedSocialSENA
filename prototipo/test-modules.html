<!DOCTYPE html>
<html>
<head>
    <title>Test de Módulos - Verificación</title>
</head>
<body>
    <h1>Test de Módulos - Verificación</h1>
    <div id="log"></div>
    
    <script type="module">
        const log = document.getElementById('log');
        const append = (msg) => {
            const p = document.createElement('p');
            p.textContent = msg;
            log.appendChild(p);
            console.log(msg);
        };

        try {
            append('✓ Iniciando pruebas de módulos...');
            
            // Test 1: Importar MockUsers
            try {
                import('./js/data/MockUsers.js').then(mod => {
                    append('✓ MockUsers.js importado correctamente');
                    append(`  - MOCK_USERS tiene ${mod.MOCK_USERS.length} usuarios`);
                    append(`  - validateCredentials es una función: ${typeof mod.validateCredentials === 'function'}`);
                }).catch(err => {
                    append(`✗ Error importando MockUsers.js: ${err.message}`);
                });
            } catch (e) {
                append(`✗ Error en importación de MockUsers: ${e.message}`);
            }

            // Test 2: Verificar que MessageManager puede ser creado
            try {
                import('./js/ui/MessageManager.js').then(mod => {
                    append('✓ MessageManager.js importado correctamente');
                    append(`  - messageManager es un objeto: ${typeof mod.messageManager === 'object'}`);
                    append(`  - Tiene método show: ${typeof mod.messageManager.show === 'function'}`);
                    append(`  - Tiene método confirm: ${typeof mod.messageManager.confirm === 'function'}`);
                }).catch(err => {
                    append(`✗ Error importando MessageManager.js: ${err.message}`);
                });
            } catch (e) {
                append(`✗ Error en MessageManager: ${e.message}`);
            }

            // Test 3: Verificar que AuthManager puede ser creado
            try {
                import('./js/ui/AuthManager.js').then(mod => {
                    append('✓ AuthManager.js importado correctamente');
                    append(`  - authManager es un objeto: ${typeof mod.authManager === 'object'}`);
                }).catch(err => {
                    append(`✗ Error importando AuthManager.js: ${err.message}`);
                });
            } catch (e) {
                append(`✗ Error en AuthManager: ${e.message}`);
            }

            // Test 4: Verificar UserService
            try {
                import('./js/services/UserService.js').then(mod => {
                    append('✓ UserService.js importado correctamente');
                    append(`  - userService es un objeto: ${typeof mod.userService === 'object'}`);
                    append(`  - Tiene método login: ${typeof mod.userService.login === 'function'}`);
                }).catch(err => {
                    append(`✗ Error importando UserService.js: ${err.message}`);
                });
            } catch (e) {
                append(`✗ Error en UserService: ${e.message}`);
            }

            append('');
            append('✓ Todas las pruebas de módulos completadas');
            append('Abre la consola (F12) para ver más detalles');

        } catch (error) {
            append(`✗ Error general: ${error.message}`);
        }
    </script>
</body>
</html>
