<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-4">Test de Navegación de Perfil</h1>
    
    <div class="space-y-4">
        <button id="testOwnProfile" class="bg-blue-500 text-white px-4 py-2 rounded">
            Navegar a mi perfil
        </button>
        <button id="testOtherProfile" class="bg-green-500 text-white px-4 py-2 rounded">
            Navegar a perfil de user_2
        </button>
        <button id="testGetParams" class="bg-purple-500 text-white px-4 py-2 rounded">
            Ver parámetros actuales
        </button>
        <button id="clearCache" class="bg-red-500 text-white px-4 py-2 rounded">
            Limpiar localStorage
        </button>
    </div>

    <div id="output" class="mt-4 p-4 bg-white rounded shadow"></div>

    <script type="module">
        import { navigationManager } from './js/ui/NavigationManager.js';
        import { userService } from './js/services/UserService.js';

        const output = document.getElementById('output');

        document.getElementById('testOwnProfile').addEventListener('click', () => {
            navigationManager.navigateToProfile();
            output.innerHTML = '<p class="text-green-600">Navegando a perfil propio...</p>';
        });

        document.getElementById('testOtherProfile').addEventListener('click', () => {
            navigationManager.navigateToProfile('user_2');
            output.innerHTML = '<p class="text-green-600">Navegando a perfil de user_2...</p>';
        });

        document.getElementById('testGetParams').addEventListener('click', () => {
            const params = navigationManager.getNavigationParams();
            const currentUser = userService.getCurrentUser();
            output.innerHTML = `
                <p><strong>Current User:</strong> ${currentUser.id} (${currentUser.nombre})</p>
                <p><strong>Navigation Params:</strong> ${JSON.stringify(params)}</p>
                <p><strong>Current Hash:</strong> ${window.location.hash}</p>
            `;
        });

        document.getElementById('clearCache').addEventListener('click', () => {
            localStorage.clear();
            output.innerHTML = '<p class="text-red-600">localStorage limpiado. Recarga la página.</p>';
        });

        // Mostrar info inicial
        setTimeout(() => {
            const currentUser = userService.getCurrentUser();
            output.innerHTML = `
                <h3 class="font-bold">Estado Inicial:</h3>
                <p>Usuario actual: ${currentUser.id} (${currentUser.nombre})</p>
                <p>Hash: ${window.location.hash || '(vacío)'}</p>
            `;
        }, 500);
    </script>
</body>
</html>
